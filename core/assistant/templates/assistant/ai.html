<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Airport-AI Assistant</title>
    <style>
      :root {
        --bg: #eef2f7;
        --panel: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --user: #2563eb;
        --assistant: #f3f4f6;
        --border: rgba(17,24,39,0.10);
        --shadow: 0 10px 30px rgba(0,0,0,0.08);
      }

      html, body { 
        height: 100%; 
        margin: 0; 
        padding: 0; 
        overflow: hidden; /* Забороняємо скрол всієї сторінки */
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }

      .wrap {
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px 16px;
        display: flex;
        flex-direction: column;
        height: 100vh; /* Рівно висота екрана */
        box-sizing: border-box;
      }

      header {
        flex-shrink: 0;
        text-align: center;
        margin-bottom: 16px;
      }

      h2 { margin: 0; font-size: 22px; letter-spacing: 0.2px; font-weight: 800; }

      .grid {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 0; /* Дозволяє внутрішньому блоку стискатися */
      }

      .chat {
        background: #f9fafb;
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 16px;
        box-shadow: var(--shadow);
        flex: 1;
        overflow-y: auto; /* Скрол лише тут */
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .msg { display: flex; margin: 8px 0; width: 100%; }
      .msg .bubble {
        max-width: 85%;
        padding: 12px 16px;
        border-radius: 18px;
        border: 1px solid var(--border);
        white-space: pre-wrap;
        line-height: 1.4;
        font-size: 15px;
        word-wrap: break-word;
      }

      .msg.user { justify-content: flex-end; }
      .msg.user .bubble { 
        background: rgba(37,99,235,0.1); 
        border-color: rgba(37,99,235,0.2); 
      }

      .msg.assistant { justify-content: flex-start; }
      .msg.assistant .bubble { 
        background: var(--assistant); 
        border-color: rgba(17,24,39,0.08); 
      }

      form {
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
        background: var(--panel);
        border: 1px solid rgba(17,24,39,0.12);
        border-radius: 20px;
        padding: 12px 16px;
        box-shadow: var(--shadow);
        margin-top: 10px;
      }

      .label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .input-row {
        display: flex;
        gap: 12px;
        align-items: flex-end;
      }

      textarea {
        flex: 1;
        resize: none;
        min-height: 44px;
        max-height: 150px;
        padding: 10px 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #fdfdfd;
        color: var(--text);
        outline: none;
        font-size: 16px;
        line-height: 1.4;
        box-sizing: border-box;
      }

      button {
        padding: 0;
        cursor: pointer;
        border-radius: 50%;
        border: none;
        background: #111;
        color: #fff;
        height: 40px;
        width: 40px;
        min-width: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: transform 0.1s;
      }

      button:active { transform: scale(0.95); }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      button span { font-size: 18px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h2>Airport-AI</h2>
      </header>

      <div class="grid">
        <div class="chat" id="chat">
          <div class="msg assistant">
            <div class="bubble">Hello! I'm your project assistant. How can I help you today?</div>
          </div>
        </div>

        <form id="form">
          <div class="label">Ask me</div>
          <div class="input-row">
            <textarea id="message" placeholder="Type your question..."></textarea>
            <button id="send" type="submit">
              <span>▶</span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <script>
      const form = document.getElementById('form');
      const messageEl = document.getElementById('message');
      const chatEl = document.getElementById('chat');
      const sendBtn = document.getElementById('send');

      function escapeHtml(s) {
        return (s || '').replace(/[&<>"']/g, (c) => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
      }

      function addMessage(role, text) {
        const wrap = document.createElement('div');
        wrap.className = 'msg ' + role;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = escapeHtml(text);
        wrap.appendChild(bubble);
        chatEl.appendChild(wrap);
        
        // Автоматичний скрол до низу при новому повідомленні
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      async function ask() {
        const message = (messageEl.value || '').trim();
        if (!message) return;

        addMessage('user', message);
        messageEl.value = '';
        sendBtn.disabled = true;

        // Показуємо стан очікування
        addMessage('assistant', 'Thinking...');
        const thinkingBubble = chatEl.lastElementChild.querySelector('.bubble');

        try {
          const res = await fetch('/api/assistant/ask/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message }),
          });

          const data = await res.json();
          thinkingBubble.innerHTML = escapeHtml(data.answer || 'No response from server.');
        } catch (err) {
          thinkingBubble.innerHTML = escapeHtml('Error: Could not connect to the server.');
        } finally {
          sendBtn.disabled = false;
          chatEl.scrollTop = chatEl.scrollHeight;
        }
      }

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        ask();
      });

      // Надсилання через Enter (без Shift)
      messageEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          form.dispatchEvent(new Event('submit'));
        }
      });
    </script>
  </body>
</html>
