version: '3.8'

services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=airport_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=AdminAirport2026

  web:
    build: .
    environment:
      - DB_HOST=db
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - '8000:8000'
    env_file:
      - .env
    depends_on:
      - db

  stripe:
    image: stripe/stripe-cli:latest
    command: listen --forward-to web:8000/api/payments/webhook/ --api-key ${STRIPE_SECRET_KEY}
    env_file:
      - .env
    depends_on:
      - web

volumes:
  postgres_data: